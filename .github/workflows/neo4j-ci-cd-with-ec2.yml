name: Neo4j CI CD with EC2

on:
  # M2 검증 완료 시점에 자동 트리거를 제거 — Neo4j 인프라 자체가 M3 에서 폐기
  # 예정. 본 워크플로우는 historical 보존 + 필요 시 수동 실행만 가능하도록.
  # paths 도 neo4j/** 였으나 디렉토리는 neo4j-deprecated/ 로 rename 됨 (afd578b).
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest  
    # 가장 최신의 Ubuntu 러너를 사용합니다.

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2
      # 현재 리포지토리를 체크아웃합니다.

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1  
      # Docker Buildx를 설정합니다.

    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}  
        # GitHub Secret에서 Docker Hub 사용자 이름을 가져옵니다.
        password: ${{ secrets.DOCKERHUB_TOKEN }}     
        # GitHub Secret에서 Docker Hub 액세스 토큰을 가져옵니다.

    - name: Build and Push
      uses: docker/build-push-action@v2
      with:
        context: ./neo4j-deprecated
        # Dockerfile이 있는 위치입니다.
        file: ./neo4j-deprecated/Dockerfile
        # Dockerfile의 경로입니다.
        push: true  
        # 이미지를 레지스트리에 푸시합니다.
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/mmt-neo4j:1.0.0
        platforms: linux/amd64,linux/arm64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: EC2 Docker Run
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        password: ${{ secrets.EC2_PASSWORD }}
        port: ${{ secrets.EC2_PORT }}
        script: |
          docker rm -f ec2-user-mmt-neo4j-1
          docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/mmt-neo4j:1.0.0
          docker-compose up -d mmt-neo4j
          docker system prune -f
