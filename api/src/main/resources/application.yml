spring:
  profiles:
    include: securelocal
  datasource:
    hikari:
      # M2 spec-01 Task 1.4: 재귀 CTE 최대 깊이를 커넥션 단위로 제한.
      # 본 코드베이스 최대 사용 깊이 5 (Depth5 메서드 군), 안전 마진 + 데이터
      # 이상 시 빠른 중단 목적으로 10 고정. GLOBAL 대신 SESSION 으로 다른
      # 앱·세션에 영향 0.
      connection-init-sql: "SET SESSION cte_max_recursion_depth = 10"
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
logging:
  level:
    com.mmt: DEBUG
    org:
      springframework:
        data:
          neo4j: DEBUG
        security: DEBUG

# M1 Spec 03 Task 3.1: 피처 플래그 및 관측성 설정 (공통 기본값).
# 모든 프로파일이 상속. 프로파일별 오버라이드는 application-<profile>.yml 에서.
mmt:
  migration:
    use-mysql-cte-for-graph: false   # M2 에서 true 로 전환
    use-jpa-for-tests: false         # JPA 전환 Epic 에서 사용
    use-jpa-for-concepts: false      # JPA 전환 Epic 에서 사용
  observability:
    slow-query-threshold-ms: 100
