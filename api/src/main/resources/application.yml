spring:
  profiles:
    include: securelocal
  datasource:
    hikari:
      # M2 Spec 01 Task 1.4: 재귀 CTE 의 무한 루프 안전망.
      # 마이그레이션 의도상 최대 깊이는 5 이지만 데이터 이상 시 빠르게 차단되도록 10 으로 고정.
      # 모든 커넥션이 SET SESSION 으로 동일 값을 적용받아 운영 측 영향 없음.
      connection-init-sql: SET SESSION cte_max_recursion_depth = 10
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
logging:
  level:
    com.mmt: DEBUG
    org:
      springframework:
        data:
          neo4j: DEBUG
        security: DEBUG

# M1 Spec 03 Task 3.1: 피처 플래그 및 관측성 설정 (공통 기본값).
# 모든 프로파일이 상속. 프로파일별 오버라이드는 application-<profile>.yml 에서.
mmt:
  migration:
    use-mysql-cte-for-graph: false   # M2 에서 true 로 전환
    use-jpa-for-tests: false         # JPA 전환 Epic 에서 사용
    use-jpa-for-concepts: false      # JPA 전환 Epic 에서 사용
  observability:
    slow-query-threshold-ms: 100
